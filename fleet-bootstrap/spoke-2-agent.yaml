clusterName: spoke-2
deploymentModel: hub-managed

harnessAgent:
  enabled: true
  metadata:
    name: "spoke2-agent"
  spec:
    name: "spoke-2-hga"
    operator: "ARGO"
    scope: "PROJECT"
    type: "MANAGED_ARGO_PROVIDER"
    projectId: "argospoke2"
    apiKeySecretRef: "harness-api-key-secret"
    tokenSecretRef: "spoke-2-agent-token"
    projectMapping:
      projectId: "argospoke2"
      AppProject: "default"

gitopsAgent:
  enabled: true
  argo-cd:
    crds:
      install: false
      keep: true
  harness:
    identity:
      accountIdentifier: "qIYsos1ZQO6fJMG1Ip6KJA"
      orgIdentifier: "Harness_Platform_Management"
      projectIdentifier: "argospoke2"
      agentIdentifier: "spoke2"
    configMap:
      http:
        tlsEnabled: false
        agentHttpTarget: "https://app.harness.io/gitops"
      logLevel: "info"
  agent:
    existingSecrets:
      agentToken: "spoke-2-agent-token"
