apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-hub-secrets
  namespace: harness-agent
spec:
  goTemplate: true
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  fleet_member: hub-cluster
              values:
                chartName: fleet-secret
                chartPath: "charts/fleet-secret"
          - git:
              repoURL: '{{.metadata.annotations.fleet_repo_url}}'
              revision: '{{.metadata.annotations.fleet_repo_revision}}'
              files:
                - path: 'fleet-bootstrap/harness-secrets/*.yaml'
  template:
    metadata:
      name: 'fleet-hub-secrets-{{.clusterName}}'
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: default
      sources:
        - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
          targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
          ref: values
        - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
          path: '{{.values.chartPath}}'
          targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
          helm:
            releaseName: 'harness-fleet-member-{{.clusterName}}'
            ignoreMissingValueFiles: true
            valuesObject:
              secretStore:
                enabled: '{{default "false" .secretStore.enabled}}'
                kind: '{{default "ClusterSecretStore" .secretStore.kind}}'
                name: '{{default "fleet-secret-store" .secretStore.name}}'
                region: '{{default "" .secretStore.region}}'
                role: '{{default "" .secretStore.role}}'
              externalSecret:
                enabled: true
                server: remote
                secretStoreRefName: 'fleet-secret-store'
                secretStoreRefKind: SecretStore
                clusterName: '{{.clusterName}}'
                secretManagerSecretName: '{{.secretManagerSecretName}}'
              genericExternalSecrets:
                harness-api-key:
                  enabled: '{{default "false" .genericExternalSecrets.enabled}}'
                  secretStoreRefName: '{{default "fleet-secret-store" .secretStore.name}}'
                  secretStoreRefKind: '{{default "ClusterSecretStore" .secretStore.kind}}'
                  targetSecretName: '{{default "harness-api-key-secret" .apiKey.targetSecretName}}'
                  refreshInterval: '{{default "1h" .apiKey.refreshInterval}}'
                  dataFrom:
                    - extract:
                        key: '{{default "harness/api-key" .apiKey.secretManagerKey}}'
      destination:
        namespace: '{{.namespace}}'
        name: '{{.destinationCluster}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true