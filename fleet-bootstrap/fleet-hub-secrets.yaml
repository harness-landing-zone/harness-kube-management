apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-hub-secrets
  namespace: harness-agent
spec:
  goTemplate: true
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  fleet_member: hub-cluster
              values:
                chartPath: "charts/fleet-secret"
          - git:
              repoURL: '{{.metadata.annotations.fleet_repo_url}}'
              revision: '{{.metadata.annotations.fleet_repo_revision}}'
              files:
                - path: 'fleet-members/{{.name}}/*.yaml'
  template:
    metadata:
      name: 'fleet-hub-secrets-{{.clusterName}}'
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: default
      sources:
        - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
          path: '{{.values.chartPath}}'
          targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
          helm:
            releaseName: 'fleet-hub-secrets-{{.clusterName}}'
            ignoreMissingValueFiles: true
            valuesObject:
              externalSecret:
                enabled: true
                secretStoreRefName: '{{default "fleet-secret-store" .secretStoreRefName}}'
                secretStoreRefKind: '{{default "SecretStore" .secretStoreRefKind}}'
                clusterName: '{{.clusterName}}'
                server: '{{default "remote" .server}}'
                secretManagerSecretName: "{{.secretManagerSecretName}}"
      destination:
        namespace: harness-agent
        name: '{{.destinationCluster}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
