apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-hub-secret-store
  namespace: harness-agent
spec:
  goTemplate: true
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - clusters:
        selector:
          matchLabels:
            fleet_member: hub-cluster
        values:
          chartPath: "charts/fleet-secret"
  template:
    metadata:
      name: 'fleet-hub-secret-store-{{.nameNormalized}}'
    spec:
      project: default
      sources:
        - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
          path: '{{.values.chartPath}}'
          targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
          helm:
            releaseName: 'fleet-hub-secret-store'
            valuesObject:
              secretStore:
                enabled: true
                provider: "aws"
                name: "fleet-secret-store"
                kind: "SecretStore"
                region: '{{default "eu-west-2 .metadata.annotations.aws_region}}'      
      destination:
        namespace: harness-agent
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
