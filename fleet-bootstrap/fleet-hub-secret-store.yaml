apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-hub-secret-store
  namespace: harness-agent
spec:
  goTemplate: true
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - clusters:
        selector:
          matchLabels:
            fleet_member: hub-cluster
        values:
          chartPath: "charts/fleet-secret"
  template:
    metadata:
      name: 'fleet-hub-secret-store-{{.nameNormalized}}'
    spec:
      project: default
      sources:
        - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
          path: '{{.values.chartPath}}'
          targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
          helm:
            releaseName: 'fleet-hub-secret-store'
            ignoreMissingValueFiles: true
            valuesObject:
              secretStore:
                enabled: true
                provider: "aws"
                name: "fleet-secret-store"
                kind: "SecretStore"
                region: '{{default "eu-west-2" (index .metadata.labels "aws_region")}}'
              genericExternalSecrets:
                harness-api-key:
                  enabled: '{{default "false" .genericExternalSecrets.enabled}}'
                  secretStoreRefName: '{{default "fleet-secret-store" .secretStore.name}}'
                  secretStoreRefKind: '{{default "ClusterSecretStore" .secretStore.kind}}'
                  targetSecretName: '{{default "harness-api-key-secret" .apiKey.targetSecretName}}'
                  refreshInterval: '{{default "1h" .apiKey.refreshInterval}}'
                  dataFrom:
                    - extract:
                        key: '{{default "harness/api-key" .apiKey.secretManagerKey}}'
      destination:
        namespace: harness-agent
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
