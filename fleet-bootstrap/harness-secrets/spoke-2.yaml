# Spoke-2 (Model 2 — hub-managed) — API key + cluster registration
clusterName: spoke-2
namespace: harness-agent-spoke-2
destinationCluster: hub

# Secret store config
secretStore:
  enabled: false
  kind: ClusterSecretStore
  name: fake-backend

# Harness API key
apiKey:
  targetSecretName: harness-api-key-secret
  secretManagerKey: "harness/api-key"

# Cluster registration — creates ArgoCD cluster secret on the hub
clusterRegistration:
  enabled: true
  server: remote
  secretManagerSecretName: "harness/cluster/spoke-2"
