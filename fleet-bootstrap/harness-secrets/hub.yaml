# Hub cluster — API key secret in harness-agent namespace
clusterName: gitops-hub-cluster
namespace: harness-agent
destinationCluster: gitops-hub-cluster

genericExternalSecrets:
  enabled: "true"

apiKey:
  targetSecretName: harness-api-key-secret
  secretManagerKey: "/gitops-hub/harness_key"
  refreshInterval: "1h"
