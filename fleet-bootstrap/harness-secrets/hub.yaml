# Hub cluster — API key only (hub is already registered as in-cluster)
clusterName: hub
namespace: harness-agent
destinationCluster: hub

# Secret store config — swap to aws/gcpsm when moving to cloud
secretStore:
  enabled: false
  kind: ClusterSecretStore
  name: fake-backend

# Harness API key
apiKey:
  targetSecretName: harness-api-key-secret
  secretManagerKey: "harness/api-key"

# Cluster registration — not needed for hub (in-cluster)
clusterRegistration:
  enabled: false
