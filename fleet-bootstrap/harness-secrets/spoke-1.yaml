# Spoke-1 (Model 1) — API key + cluster registration
clusterName: spoke-1
namespace: harness-agent
destinationCluster: hub

# Secret store config
secretStore:
  enabled: false
  kind: ClusterSecretStore
  name: fake-backend

# Harness API key
apiKey:
  targetSecretName: harness-api-key-secret
  secretManagerKey: "harness/api-key"

# Cluster registration — creates ArgoCD cluster secret on the hub
clusterRegistration:
  enabled: true
  server: remote
  secretManagerSecretName: "harness/cluster/spoke-1"
