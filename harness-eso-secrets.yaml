apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: harness-eso-secrets
  namespace: harness-agent
spec:
  goTemplate: true
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  fleet_member: hub-cluster
              values:
                chartName: fleet-secret
                chartPath: "charts/fleet-secret"
          - git:
              repoURL: '{{.metadata.annotations.fleet_repo_url}}'
              revision: '{{.metadata.annotations.fleet_repo_revision}}'
              files:
                - path: 'fleet-bootstrap/harness-secrets/*.yaml'
  template:
    metadata:
      name: 'harness-eso-secrets-{{.clusterName}}'
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: default
      sources:
        - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
          targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
          ref: values
        - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
          path: '{{.values.chartPath}}'
          targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
          helm:
            releaseName: 'harness-eso-secrets-{{.clusterName}}'
            ignoreMissingValueFiles: true
            valuesObject:
              genericExternalSecrets:
                harness-api-key:
                  enabled: true
                  secretStoreRefName: '{{.secretStoreRefName}}'
                  secretStoreRefKind: '{{.secretStoreRefKind}}'
                  targetSecretName: '{{.targetSecretName}}'
                  refreshInterval: '{{default "1h" .refreshInterval}}'
                  dataFrom:
                    - extract:
                        key: '{{.secretManagerKey}}'
      destination:
        namespace: '{{.namespace}}'
        name: '{{.destinationCluster}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
