apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gitops-agent
  namespace: gitops-agent
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: hub-cluster
      values:
        addonChart: application-sets
  template:
    metadata:
      name: gitops-agent
    spec:
      project: default
      sources:
      - ref: values
        repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
      - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        path: 'charts/{{.values.addonChart}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            - $values/charts/application-sets/test-values-harness-bootstrap.yaml
      destination:
        namespace: gitops-agent
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true