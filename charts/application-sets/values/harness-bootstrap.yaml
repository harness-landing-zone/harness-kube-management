harness-agent-controller:
  enabled: true
  namespace: harness-system
  releaseName: agent-controller
  chartName: harness-gitops-agent-controller
  defaultVersion: "0.2.0"
  path: "charts/harness-gitops-agent-controller"
  annotationsApp:
    argocd.argoproj.io/sync-wave: "10"
  selector:
    matchExpressions:
      - key: enable_controller
        operator: In
        values: ["true"]
  valuesObject:
    image:
      repository: '{{default "mkandylis/harness-gitops-agent-operator" (index .metadata.annotations "harness_controller_image_repository")}}'
      tag: '{{default "dev-13" (index .metadata.annotations "harness_controller_image_tag")}}'
    manager:
      zapDevelopment: false


harness-agent-bootstrap:
  enabled: false
  namespace: gitops-agent
  releaseName: harness-agent-bootstrap
  chartName: harness-gitops-agent-bootstrap
  defaultVersion: "0.1.0"
  path: "charts/harness-gitops-agent-bootstrap"
  annotationsApp:
    argocd.argoproj.io/sync-wave: "20"
  selector:
    matchExpressions:
      - key: enable_agent
        operator: In
        values: ["true"]
  valuesObject:
    harnessAgent:
      metadata:
        name: '{{.name}}-agent'
      spec:
        name: '{{.name}}-agent'
        operator: "ARGO"
        scope: "PROJECT"
        type: "MANAGED_ARGO_PROVIDER"
        apiKeySecretRef: '{{default "harness-api-key-secret" (index .metadata.annotations "harness_api_key_secret_ref")}}'
        tokenSecretRef: '{{default (printf "%s-agent-token" .name) (index .metadata.annotations "harness_token_secret_ref")}}'
        projectMapping:
          projectId: '{{default "" (index .metadata.annotations "harness_project_id")}}'
          AppProject: '{{default "default" (index .metadata.annotations "harness_app_project")}}'
    appProject:
      enabled: true
      name: '{{default "default" (index .metadata.annotations "harness_app_project")}}'
    gitopsAgent:
      enabled: true
      harness:
        identity:
          accountIdentifier: '{{default "" (index .metadata.annotations "harness_account_id")}}'
          orgIdentifier: '{{default "Harness_Platform_Management" (index .metadata.annotations "harness_org_id")}}'
          projectIdentifier: '{{default "" (index .metadata.annotations "harness_project_id")}}'
          agentIdentifier: '{{default .name (index .metadata.annotations "harness_agent_identifier")}}'
        configMap:
          http:
            tlsEnabled: false
            agentHttpTarget: "https://app.harness.io/gitops"
          logLevel: "info"
      agent:
        existingSecrets:
          agentToken: '{{default (printf "%s-agent-token" .name) (index .metadata.annotations "harness_token_secret_ref")}}'

