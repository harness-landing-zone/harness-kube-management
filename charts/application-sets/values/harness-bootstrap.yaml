external-secrets:
  enabled: true
  namespace: external-secrets
  chartName: external-secrets
  defaultVersion: "0.18.2"
  chartRepository: "https://charts.external-secrets.io"
  annotationsApp:
    argocd.argoproj.io/sync-wave: "1"
  selector:
    matchExpressions:
      - key: enable_external_secrets
        operator: In
        values: ["true"]
  valuesObject:
    installCRDs: true
                  
harness-agent-controller:
  enabled: true
  namespace: harness-system
  releaseName: agent-controller
  chartName: harness-gitops-agent-controller
  defaultVersion: "0.2.0"
  path: "charts/harness-gitops-agent-controller"
  annotationsApp:
    argocd.argoproj.io/sync-wave: "10"
  selector:
    matchExpressions:
      - key: enable_agent_controller
        operator: In
        values: ["true"]
  valuesObject:
    image:
      repository: '{{default "mkandylis/harness-gitops-agent-operator" (index .metadata.annotations "harness_controller_image_repository")}}'
      tag: '{{default "dev-14" (index .metadata.annotations "harness_controller_image_tag")}}'
    manager:
      zapDevelopment: false

harness-agent-bootstrap:
  enabled: true
  namespace: gitops-agent
  releaseName: harness-agent-bootstrap
  chartName: harness-gitops-agent-bootstrap
  defaultVersion: "0.1.0"
  path: "charts/harness-gitops-agent-bootstrap"
  annotationsApp:
    argocd.argoproj.io/sync-wave: "20"
  selector:
    matchExpressions:
      - key: enable_agent
        operator: In
        values: ["true"]
  valuesObject:
    harnessAgent:
      metadata:
        name: '{{.name}}-agent'
      spec:
        name: '{{.name}}-agent'
        operator: "ARGO"
        scope: "PROJECT"
        type: "MANAGED_ARGO_PROVIDER"
        apiKeySecretRef: '{{default "harness-api-key-secret" (index .metadata.annotations "harness_api_key_secret_ref")}}'
        tokenSecretRef: '{{default (printf "%s-agent-token" .name) (index .metadata.annotations "harness_token_secret_ref")}}'
        projectMapping:
          projectId: '{{default "" (index .metadata.annotations "harness_project_id")}}'
          AppProject: '{{default "default" (index .metadata.annotations "harness_app_project")}}'
    appProject:
      enabled: true
      name: '{{default "default" (index .metadata.annotations "harness_app_project")}}'
    gitopsAgent:
      enabled: true
      harness:
        identity:
          accountIdentifier: '{{default "" (index .metadata.annotations "harness_account_id")}}'
          orgIdentifier: '{{default "Harness_Platform_Management" (index .metadata.annotations "harness_org_id")}}'
          projectIdentifier: '{{default "" (index .metadata.annotations "harness_project_id")}}'
          agentIdentifier: '{{default .name (index .metadata.annotations "harness_agent_identifier")}}'
        configMap:
          http:
            tlsEnabled: false
            agentHttpTarget: "https://app.harness.io/gitops"
          logLevel: "info"
      agent:
        existingSecrets:
          agentToken: '{{default (printf "%s-agent-token" .name) (index .metadata.annotations "harness_token_secret_ref")}}'

harness-secret:
  enabled: true
  namespace: gitops-agent
  releaseName: harness-secret
  chartName: harness-secret
  defaultVersion: "0.3.0"
  path: "charts/fleet-secret"
  annotationsApp:
    argocd.argoproj.io/sync-wave: "5"
  selector:
    matchExpressions:
      - key: enable_harness_secret
        operator: In
        values: ["true"]
  valuesObject:
    secretStore:
      enabled: "true"
      kind: SecretStore
      name: fleet-secret-store
      region: '{{default "eu-west-2" (index .metadata.annotations "aws_region")}}'
    genericExternalSecrets:
      harness-api-key:
        enabled: "true"
        secretStoreRefName: fleet-secret-store
        secretStoreRefKind: SecretStore
        targetSecretName: harness-api-key-secret
        refreshInterval: "1h"
        dataFrom:
          - extract:
              key: "/gitops-hub/harness_key"
