{{- if and .Values.appProject.enabled .Values.gitopsAgent.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: {{ default "default" .Values.appProject.name | quote }}
  namespace: {{ default .Release.Namespace .Values.appProject.namespace | quote }}
  annotations:
    # Run AFTER all regular resources (including argo-cd CRDs) are installed
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
    {{- with .Values.appProject.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "harness-gitops-agent-bootstrap.labels" . | nindent 4 }}
    {{- with .Values.appProject.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  description: {{ default "Bootstrap AppProject created by harness-gitops-agent-bootstrap" .Values.appProject.description | quote }}
  sourceRepos:
    - "*"
  destinations:
    - namespace: "*"
      server: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
{{- end }}