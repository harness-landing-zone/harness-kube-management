{{- if .Values.harnessAgent.enabled }}
{{- $identity := .Values.gitopsAgent.harness.identity -}}
{{- $scope := default "PROJECT" .Values.harnessAgent.spec.scope -}}
{{- $accountId := required "gitopsAgent.harness.identity.accountIdentifier is required" $identity.accountIdentifier -}}
{{- $orgId := "" -}}
{{- if ne $scope "ACCOUNT" -}}
{{- $orgId = required "gitopsAgent.harness.identity.orgIdentifier is required for ORG and PROJECT scope" $identity.orgIdentifier -}}
{{- else -}}
{{- $orgId = default "" $identity.orgIdentifier -}}
{{- end -}}
{{- $identityProjectId := default "" $identity.projectIdentifier -}}
{{- $specProjectId := default "" .Values.harnessAgent.spec.projectId -}}
{{- $resolvedProjectId := trim $specProjectId -}}
{{- if eq $resolvedProjectId "" -}}
{{- $resolvedProjectId = trim $identityProjectId -}}
{{- end -}}
{{- $projectId := "" -}}
{{- if eq $scope "PROJECT" -}}
{{- $projectId = required "projectId is required for PROJECT scope (set harnessAgent.spec.projectId or gitopsAgent.harness.identity.projectIdentifier)" $resolvedProjectId -}}
{{- else -}}
{{- $projectId = $resolvedProjectId -}}
{{- end -}}
{{- $mappingProjectId := trim (default "" .Values.harnessAgent.spec.projectMapping.projectId) -}}
{{- $mappingAppProject := trim (default "" .Values.harnessAgent.spec.projectMapping.AppProject) -}}
{{- $hasProjectMapping := or (ne $mappingProjectId "") (ne $mappingAppProject "") -}}
{{- if $hasProjectMapping -}}
{{- if or (eq $mappingProjectId "") (eq $mappingAppProject "") -}}
{{- fail "both harnessAgent.spec.projectMapping.projectId and harnessAgent.spec.projectMapping.AppProject are required when projectMapping is set" -}}
{{- end -}}
{{- end -}}
{{- $agentIdentifier := required "gitopsAgent.harness.identity.agentIdentifier is required" $identity.agentIdentifier -}}
{{- $apiKeySecretRef := required "harnessAgent.spec.apiKeySecretRef is required" .Values.harnessAgent.spec.apiKeySecretRef -}}
{{- $tokenSecretRef := required "harnessAgent.spec.tokenSecretRef is required" .Values.harnessAgent.spec.tokenSecretRef -}}
{{- $gitopsAgentTokenSecretRef := required "gitopsAgent.agent.existingSecrets.agentToken is required" .Values.gitopsAgent.agent.existingSecrets.agentToken -}}
{{- if ne $tokenSecretRef $gitopsAgentTokenSecretRef -}}
{{- fail "harnessAgent.spec.tokenSecretRef must match gitopsAgent.agent.existingSecrets.agentToken" -}}
{{- end }}
apiVersion: infrastructure.kandylis.co.uk/v1
kind: HarnessGitopsAgent
metadata:
  name: {{ default $agentIdentifier .Values.harnessAgent.metadata.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harness-gitops-agent-bootstrap.labels" . | nindent 4 }}
    {{- with .Values.harnessAgent.metadata.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.harnessAgent.metadata.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  name: {{ default $agentIdentifier .Values.harnessAgent.spec.name | quote }}
  identifier: {{ $agentIdentifier | quote }}
  accountId: {{ $accountId | quote }}
  {{- if $orgId }}
  orgId: {{ $orgId | quote }}
  {{- end }}
  {{- if $projectId }}
  projectId: {{ $projectId | quote }}
  {{- end }}
  operator: {{ .Values.harnessAgent.spec.operator | quote }}
  scope: {{ .Values.harnessAgent.spec.scope | quote }}
  type: {{ .Values.harnessAgent.spec.type | quote }}
  apiKeySecretRef: {{ $apiKeySecretRef | quote }}
  tokenSecretRef: {{ $tokenSecretRef | quote }}
  {{- if .Values.harnessAgent.spec.existingAgentIdentifier }}
  existingAgentIdentifier: {{ .Values.harnessAgent.spec.existingAgentIdentifier | quote }}
  {{- end }}
  {{- if $hasProjectMapping }}
  projectMapping:
    projectId: {{ $mappingProjectId | quote }}
    AppProject: {{ $mappingAppProject | quote }}
  {{- end }}
{{- end }}
