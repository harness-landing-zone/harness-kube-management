nameOverride: ""
fullnameOverride: ""

harnessAgent:
  enabled: true
  metadata:
    name: ""
    annotations: {}
    labels: {}
  spec:
    # Optional display name in Harness. Defaults to gitopsAgent.harness.identity.agentIdentifier.
    name: ""
    operator: "ARGO"
    scope: "PROJECT"
    type: "MANAGED_ARGO_PROVIDER"
    # Optional Harness project for PROJECT-scope agent registration.
    projectId: ""
    # Optional explicit mapping input.
    # When set, both fields are required and used for AppProject mapping API calls.
    projectMapping:
      projectId: ""
      AppProject: ""
    # Optional: reuse an existing Harness agent instead of creating a new one.
    existingAgentIdentifier: ""
    # Secret in release namespace that contains key: api_key
    apiKeySecretRef: "harness-api-key-secret"
    # Secret created by controller containing GITOPS_AGENT_TOKEN.
    # Must match gitopsAgent.agent.existingSecrets.agentToken.
    tokenSecretRef: "my-agent-token"

# Optional Argo CD AppProject created by this chart.
# Created only when both appProject.enabled=true and gitopsAgent.enabled=true.
appProject:
  enabled: false
  name: "default"
  namespace: ""
  description: "Default bootstrap AppProject"
  annotations: {}
  labels: {}

# Values passed to harness/gitops-helm dependency (aliased as gitopsAgent).
gitopsAgent:
  # Phase switch:
  # - false: create/update only HarnessGitopsAgent CR (no runtime subchart)
  # - true: install/upgrade gitops-helm runtime
  enabled: true
  argo-cd:
    enabled: true
    repoServer:
      # Ensure helm-secrets wrapper invokes the real Helm binary.
      env:
        - name: HELM_BIN
          value: /usr/local/bin/helm
        - name: HELM_SECRETS_HELM_PATH
          value: /usr/local/bin/helm
        - name: ARGOCD_EXEC_TIMEOUT
          value: 5m
    configs:
      params:
        server.repo.server.timeout.seconds: "300"
        controller.repo.server.timeout.seconds: "300"

  harness:
    identity:
      accountIdentifier: ""
      orgIdentifier: ""
      # Runtime gitops-agent scope. Keep empty for ORG/ACCOUNT agents so the runtime does
      # not force project-scoped registration.
      projectIdentifier: ""
      # Keep this unprefixed (for example "hubagent"). The controller handles
      # scope-specific API path prefixes ("org." / "account.") automatically.
      agentIdentifier: ""
    configMap:
      http:
        tlsEnabled: false
        agentHttpTarget: "https://app.harness.io/gitops"
      logLevel: "info"
    createClusterRoles: true
    networkPolicy:
      create: true

  agent:
    existingSecrets:
      # Must match harnessAgent.spec.tokenSecretRef
      agentToken: "my-agent-token"
    replicas: 1
    highAvailability: false
    serviceAccount:
      create: true
      name: gitops-agent
      automountServiceAccountToken: true
    containerSecurityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "512Mi"
    image:
      repository: harness/gitops-agent
      tag: v0.93.0
      imagePullPolicy: IfNotPresent
    pdb:
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false

  upgrader:
    enabled: false
