harnessAgent:
  enabled: true
  metadata:
    name: "spoke-hga"
  spec:
    name: "spoke-hga"
    operator: "ARGO"
    scope: "PROJECT"
    type: "MANAGED_ARGO_PROVIDER"
    apiKeySecretRef: "harness-api-key-secret"
    tokenSecretRef: "my-spoke-token"

appProject:
  enabled: true
  name: "default"

gitopsAgent:
  harness:
    identity:
      accountIdentifier: "qIYsos1ZQO6fJMG1Ip6KJA"
      orgIdentifier: "Harness_Platform_Management"
      # Keep empty for ORG-scope runtime registration.
      projectIdentifier: ""
      # Keep unprefixed; controller adds org./account. prefixes for API-path calls.
      agentIdentifier: "hubhga"
    configMap:
      http:
        tlsEnabled: false
        agentHttpTarget: "https://app.harness.io/gitops"
      logLevel: "info"
  agent:
    existingSecrets:
      agentToken: "my-hga-token"
  argo-cd:
    configs:
      clusterCredentials:
        hubv2:
          server: "https://kubernetes.default.svc"
          config:
            tlsClientConfig:
              insecure: true
          labels:
            argocd.argoproj.io/secret-type: cluster
            fleet_member: hub-cluster
            enable_agent: "false"
          annotations:
            fleet_repo_url: "https://github.com/harness-landing-zone/harness-kube-management"
            fleet_repo_revision: "main"
            harness_account_id: "qIYsos1ZQO6fJMG1Ip6KJA"
            harness_org_id: "Harness_Platform_Management"
            harness_api_key_secret_ref: "harness-api-key-secret"
