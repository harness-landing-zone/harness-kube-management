gitopsAgent:
  harness:
    identity:
      accountIdentifier: "qIYsos1ZQO6fJMG1Ip6KJA"
      orgIdentifier: "gitops_fleet_management"
      # Keep empty for ORG-scope runtime registration.
      projectIdentifier: ""
      # The Agent Identtifiee
      agentIdentifier: "hub_agent"
    configMap:
      http:
        tlsEnabled: false
        agentHttpTarget: "https://app.harness.io/gitops"
      logLevel: "info"
  agent:
    existingSecrets:
      agentToken: "hub-agent-token"
  argo-cd:
    configs:
      cm:
        cluster.inClusterEnabled: false
      clusterCredentials:
        hub:
          server: "https://kubernetes.default.svc"
          config:
            tlsClientConfig:
              insecure: true
          labels:
            fleet_member: hub-cluster
            enable_agent: "false"
          annotations:
            fleet_repo_url: "https://github.com/harness-landing-zone/harness-kube-management"
            fleet_repo_revision: "main"
            harness_account_id: "qIYsos1ZQO6fJMG1Ip6KJA"
            harness_org_id: "gitops_fleet_management"

harnessAgent:
  enabled: true
  metadata:
    name: "hub-hgac"
  spec:
    name: "hub-agent"
    operator: "ARGO"
    scope: "ORG"
    type: "MANAGED_ARGO_PROVIDER"
    # The Secret Name that will read the Harness API the secret must be api_key: <your api key>
    apiKeySecretRef: "harness-api-key-secret"
    # Secret of the Token Created when the Agent is Created in Harness Plarform this will be used from Gitops Agent
    tokenSecretRef: "hub-agent-token"
    # Optional explicit mapping for ACCOUNT/ORG/PROJECT scope.
    projectMapping:
      projectId: "fleet_admins"
      AppProject: "default"

# Creating the Project in ArgoCD to map it with a project
appProject:
  enabled: true
  name: "default"
