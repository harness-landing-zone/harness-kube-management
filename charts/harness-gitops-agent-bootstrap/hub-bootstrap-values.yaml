harnessAgent:
  metadata:
    name: "hub-agent"
  spec:
    apiKeySecretRef: "harness-api-key-secret"
    tokenSecretRef: "my-agent-token"
    clusterRegistration:
      enabled: true
      name: "spoke"
      connectionType: "IN_CLUSTER"

gitopsAgent:
  harness:
    identity:
      accountIdentifier: "qIYsos1ZQO6fJMG1Ip6KJA"
      orgIdentifier: "latform_team"
      projectIdentifier: "Gitops"
      agentIdentifier: "hubagent"
    configMap:
      http:
        tlsEnabled: false
        agentHttpTarget: "https://app.harness.io/gitops"
      logLevel: "info"
  agent:
    existingSecrets:
      agentToken: "my-agent-token"
