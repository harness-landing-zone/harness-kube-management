harnessAgent:
  enabled: true
  metadata:
    name: "hub-hgac"
  spec:
    name: "hub-hgac"
    operator: "ARGO"
    scope: "ORG"
    type: "MANAGED_ARGO_PROVIDER"
    apiKeySecretRef: "harness-api-secret"
    tokenSecretRef: "hub-hgac-token"
    # Optional explicit mapping for ACCOUNT/ORG/PROJECT scope.
    projectMapping:
      projectId: "gitopsdev"
      AppProject: "default"

appProject:
  enabled: true
  name: "default"

gitopsAgent:
  harness:
    identity:
      accountIdentifier: "qIYsos1ZQO6fJMG1Ip6KJA"
      orgIdentifier: "Harness_Platform_Management"
      # Keep empty for ORG-scope runtime registration.
      projectIdentifier: ""
      # Keep unprefixed; controller adds org./account. prefixes for API-path calls.
      agentIdentifier: "hubhgac"
    configMap:
      http:
        tlsEnabled: false
        agentHttpTarget: "https://app.harness.io/gitops"
      logLevel: "info"
  agent:
    existingSecrets:
      agentToken: "hub-hgac-token"
  argo-cd:
    configs:
      cm:
        cluster.inClusterEnabled: false
      clusterCredentials:
        hub:
          server: "https://kubernetes.default.svc"
          config:
            tlsClientConfig:
              insecure: true
          labels:
            fleet_member: hub-cluster
            enable_agent: "false"
          annotations:
            fleet_repo_url: "https://github.com/harness-landing-zone/harness-kube-management"
            fleet_repo_revision: "main"
            harness_account_id: "qIYsos1ZQO6fJMG1Ip6KJA"
            harness_org_id: "Harness_Platform_Management"
