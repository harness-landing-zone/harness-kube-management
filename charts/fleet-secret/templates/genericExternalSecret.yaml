{{- if .Values.genericExternalSecrets }}
{{- range $name, $secret := .Values.genericExternalSecrets }}
{{- if $secret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  {{- if $secret.namespace }}
  namespace: {{ $secret.namespace }}
  {{- end }}
  {{- if $secret.annotations }}
  annotations:
    {{- toYaml $secret.annotations | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/managed-by: fleet-secret
    {{- if $secret.labels }}
    {{- toYaml $secret.labels | nindent 4 }}
    {{- end }}
spec:
  secretStoreRef:
    name: {{ $secret.secretStoreRefName }}
    kind: {{ $secret.secretStoreRefKind | default "ClusterSecretStore" }}
  refreshInterval: {{ $secret.refreshInterval | default "1h" | quote }}
  target:
    name: {{ $secret.targetSecretName | default $name }}
    creationPolicy: {{ $secret.creationPolicy | default "Owner" }}
    {{- if $secret.template }}
    template:
      engineVersion: v2
      data:
        {{- toYaml $secret.template.data | nindent 8 }}
    {{- end }}
  {{- if $secret.data }}
  data:
    {{- range $secret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.version }}
        version: {{ .remoteRef.version | quote }}
        {{- end }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property }}
        {{- end }}
    {{- end }}
  {{- end }}
  {{- if $secret.dataFrom }}
  dataFrom:
    {{- range $secret.dataFrom }}
    - extract:
        key: {{ .extract.key }}
        {{- if .extract.version }}
        version: {{ .extract.version | quote }}
        {{- end }}
        conversionStrategy: {{ .extract.conversionStrategy | default "Default" }}
        decodingStrategy: {{ .extract.decodingStrategy | default "None" }}
        metadataPolicy: {{ .extract.metadataPolicy | default "None" }}
    {{- end }}
  {{- end }}
---
{{- end }}
{{- end }}
{{- end }}
