{{- range $name, $secret := .Values.genericExternalSecrets }}
{{- if $secret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}
spec:
  secretStoreRef:
    kind: {{ $secret.secretStoreRefKind | default "SecretStore" }}
    name: {{ $secret.secretStoreRefName | default "fleet-secret-store" }}
  refreshInterval: {{ $secret.refreshInterval | default "1h" | quote }}
  target:
    name: {{ $secret.targetSecretName }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        conversionStrategy: {{ default "Default" $externalSecret.conversionStrategy }}
        metadataPolicy: {{ default "None" $externalSecret.metadataPolicy }}
        decodingStrategy: Auto
        {{- toYaml $secret.dataFrom | nindent 4 }}
---
{{- end }}
{{- end }}
